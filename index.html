<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive</title>
    <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive Logo">
                <span>Drive</span>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-button" title="Apps">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 14c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
            </button>
            <button class="login-btn">Inloggen</button>
        </div>
    </header>

    <main class="container">
        <div class="folder-toolbar">
            <h1 class="folder-title">pyinstaller</h1>
            <div class="toolbar-actions">
                <a href="#" class="download-link">Alles downloaden</a>
                <div class="view-controls">
                    <button class="view-btn active">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M3 15h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V9H3v2zm0-6v2h18V5H3z"/></svg>
                    </button>
                    <button class="view-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="file-list">
            <div class="list-header">
                <div class="header-col">Naam <span class="sort-icon">↑</span></div>
                <div class="header-col">Eigenaar</div>
                <div class="header-col">Datum gewijzigd</div>
                <div class="header-col">Bestandsgrootte</div>
                <div class="header-col">Download</div>
            </div>
            <!-- Rows will be generated dynamically by script.js -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
